<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You're Invited 🎉</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
      padding-top: 100px;
      overflow: hidden;
    }

    /* floating emojis */
    .emoji {
      position: fixed;
      font-size: 24px;
      animation: float 6s linear infinite;
      opacity: 0.7;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-10vh); }
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #f44336; color: white; }

    .hidden { display: none; }

    img.gif {
      width: 120px;
      margin: 10px auto;
      display: block;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<!-- floating cute emojis -->
<div class="emoji" style="left:10%; animation-delay:0s">🎂</div>
<div class="emoji" style="left:30%; animation-delay:2s">✨</div>
<div class="emoji" style="left:50%; animation-delay:4s">🎉</div>
<div class="emoji" style="left:70%; animation-delay:1s">💖</div>
<div class="emoji" style="left:90%; animation-delay:3s">🫶</div>

<div class="card">
  <h2>🎂 You're Invited!</h2>
  <p>Bestie you are invited for Minjin's birthday dinner and potential after pub crawl... Please let me know if you are coming or not! :)</p>
  <p>Please select your choice and RSVP.</p>

  <!-- champagne gif -->
  <img class="gif" src="https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif" alt="champagne celebration">

  <div id="buttons">
    <button class="yes" onclick="rsvpYes()">Yes 🎉</button>
    <button class="no" id="noBtn" onclick="rsvpNo()">No 😢</button>
  </div>

  <div id="response" class="hidden"></div>
</div>

<script>
  function rsvpYes() {
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    audio.play();
    const res = document.getElementById('response');
    res.classList.remove('hidden');
    res.innerHTML = `
      <h3>Yay! 🎉</h3>
      <img class="gif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
      <p>Here's the location:</p>
      <p><strong><a href="https://maps.app.goo.gl/cMtqJ7rvLxvYjP7i9" target="_blank">Bělehradská 573/61, 120 00 Vinohrady 📍</a></strong></p>
      <p>Time: 7:30 PM</p>
    `;
    document.getElementById('buttons').style.display = 'none';
  }

  function rsvpNo() {
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
    audio.play();
    const res = document.getElementById('response');
    res.classList.remove('hidden');
    res.innerHTML = `
      <h3>See you around, pookie 😌</h3>
      <img class="gif" src="https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif">
    `;
    document.getElementById('buttons').style.display = 'none';
  }

  const noBtn = document.getElementById('noBtn');
  let attempts = 0;

  noBtn.addEventListener('mouseover', () => {
    attempts++;
    const res = document.getElementById('response');

    if (attempts < 4) {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';

      res.classList.remove('hidden');
      res.innerHTML = `<p>why are you like this 😭</p>`;
    } else {
      noBtn.style.position = 'static';
      res.innerHTML = `<p>fine… if you insist 🙄</p>`;
    }
  });
</script>

<script>
// === GOOGLE SHEETS CONFIG ===
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzF1xXkd2wXr-6cLQ5h3k9tXwZYrW0hG6Yqkq2bq5t_8Rr7kT3g/exec";

// add name input
const buttonsDiv = document.getElementById('buttons');
const nameInput = document.createElement('input');
nameInput.placeholder = "Enter your name bestie 😌";
nameInput.style.padding = "10px";
nameInput.style.borderRadius = "10px";
nameInput.style.border = "1px solid #ccc";
nameInput.style.marginBottom = "10px";
nameInput.style.width = "80%";
buttonsDiv.parentNode.insertBefore(nameInput, buttonsDiv);

function sendRSVP(name, answer) {
  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE")) return;

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ name, answer }),  
  });
}

// override RSVP functions
const oldYes = rsvpYes;
rsvpYes = function() {
  const name = nameInput.value || "Anonymous";
  sendRSVP(name, "Yes");
  oldYes();
}

const oldNo = rsvpNo;
rsvpNo = function() {
  const name = nameInput.value || "Anonymous";
  sendRSVP(name, "No");
  oldNo();
}
</script>

</body>
</html>
